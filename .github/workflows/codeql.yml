name: CodeQL

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: '30 1 * * 4'

permissions:
  actions: read
  checks: write
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        id: initialize
        uses: github/codeql-action/init@bc0b696b4103f5fe60f15749af68a046868d511a #v4.35.5
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        id: autobuild
        uses: github/codeql-action/autobuild@bc0b696b4103f5fe60f15749af68a046868d511a #v4.35.5

      - name: Perform CodeQL Analysis
        id: analyze
        uses: github/codeql-action/analyze@bc0b696b4103f5fe60f15749af68a046868d511a #v4.35.5
